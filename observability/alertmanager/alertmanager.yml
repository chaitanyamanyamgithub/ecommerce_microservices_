global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: ['alertname', 'service', 'severity']
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 2h

receivers:
  - name: default
    # Add slack_configs, email_configs, or webhook_configs here when
    # you are ready to deliver alerts to people or incident tooling.
