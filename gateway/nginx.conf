server {
    listen 8080;
    server_name localhost;

    resolver 127.0.0.11 valid=10s ipv6=off;

    set $user_service http://user-service:3001;
    set $product_service http://product-service:3002;
    set $cart_service http://cart-service:3003;
    set $order_service http://order-service:3004;
    set $payment_service http://payment-service:3005;

    # Proxy settings
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 10s;
    proxy_read_timeout 30s;

    # Health check
    location /health {
        return 200 '{"status":"gateway healthy"}';
        add_header Content-Type application/json;
    }

    # User Service: /api/users, /api/signup, /api/login
    location /api/signup {
        proxy_pass $user_service;
    }

    location /api/login {
        proxy_pass $user_service;
    }

    location /api/users {
        proxy_pass $user_service;
    }

    # Product Service: /api/products
    location /api/products {
        proxy_pass $product_service;
    }

    # Cart Service: /api/cart
    location /api/cart {
        proxy_pass $cart_service;
    }

    # Order Service: /api/orders
    location /api/orders {
        proxy_pass $order_service;
    }

    # Payment Service: /api/payment
    location /api/payment {
        proxy_pass $payment_service;
    }
}
