# ===========================================================
# eCommerce Microservices - Docker Compose Configuration
# ===========================================================
# Orchestrates all 5 microservices + MongoDB instance.
#
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose up user-service # Start specific service
#   docker-compose down            # Stop all services
#   docker-compose logs -f         # Follow logs
# ===========================================================

services:
  # ── MongoDB Database ──────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: ecommerce-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin_password
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── User Service ──────────────────────────────────────────
  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: ecommerce-user-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
      MONGO_URI: mongodb://admin:admin_password@mongodb:27017/ecommerce_users?authSource=admin
      JWT_SECRET: your_production_jwt_secret_change_this
      JWT_EXPIRES_IN: 7d
      LOG_LEVEL: info
      OTEL_SERVICE_NAME: user-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    volumes:
      - ./shared:/app/shared:ro  # Mount shared utilities as read-only
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ecommerce-network

  # ── Product Service ───────────────────────────────────────
  product-service:
    build:
      context: ./services/product-service
      dockerfile: Dockerfile
    container_name: ecommerce-product-service
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      NODE_ENV: production
      MONGO_URI: mongodb://admin:admin_password@mongodb:27017/ecommerce_products?authSource=admin
      LOG_LEVEL: info
      OTEL_SERVICE_NAME: product-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    volumes:
      - ./shared:/app/shared:ro
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ecommerce-network

  # ── Cart Service ──────────────────────────────────────────
  cart-service:
    build:
      context: ./services/cart-service
      dockerfile: Dockerfile
    container_name: ecommerce-cart-service
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      NODE_ENV: production
      MONGO_URI: mongodb://admin:admin_password@mongodb:27017/ecommerce_carts?authSource=admin
      LOG_LEVEL: info
      OTEL_SERVICE_NAME: cart-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    volumes:
      - ./shared:/app/shared:ro
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ecommerce-network

  # ── Order Service ─────────────────────────────────────────
  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    container_name: ecommerce-order-service
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      NODE_ENV: production
      MONGO_URI: mongodb://admin:admin_password@mongodb:27017/ecommerce_orders?authSource=admin
      PRODUCT_SERVICE_URL: http://product-service:3002
      CART_SERVICE_URL: http://cart-service:3003
      PAYMENT_SERVICE_URL: http://payment-service:3005
      LOG_LEVEL: info
      OTEL_SERVICE_NAME: order-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    volumes:
      - ./shared:/app/shared:ro
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ecommerce-network

  # ── Payment Service ───────────────────────────────────────
  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    container_name: ecommerce-payment-service
    restart: unless-stopped
    ports:
      - "3005:3005"
    environment:
      PORT: 3005
      NODE_ENV: production
      MONGO_URI: mongodb://admin:admin_password@mongodb:27017/ecommerce_payments?authSource=admin
      PAYMENT_GATEWAY_KEY: pk_test_your_test_key
      PAYMENT_GATEWAY_SECRET: sk_test_your_secret_key
      LOG_LEVEL: info
      OTEL_SERVICE_NAME: payment-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    volumes:
      - ./shared:/app/shared:ro
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ecommerce-network

  # ── API Gateway (Nginx) ────────────────────────────────────
  api-gateway:
    image: nginx:1.25-alpine
    container_name: ecommerce-api-gateway
    restart: unless-stopped
    ports:
      - "8000:8080"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - user-service
      - product-service
      - cart-service
      - order-service
      - payment-service
    networks:
      - ecommerce-network

  # ── OpenTelemetry Collector ─────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: ecommerce-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    depends_on:
      - jaeger
    networks:
      - ecommerce-network

  # ── Prometheus (Metrics) ──────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: ecommerce-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - otel-collector
      - alertmanager
    networks:
      - ecommerce-network

  # Alertmanager (Alert Routing)
  alertmanager:
    image: prom/alertmanager:latest
    container_name: ecommerce-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    networks:
      - ecommerce-network

  # ── Loki (Logs Backend) ────────────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: ecommerce-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - ecommerce-network

  # ── Promtail (Log Collector) ───────────────────────────────
  promtail:
    image: grafana/promtail:latest
    container_name: ecommerce-promtail
    restart: unless-stopped
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./observability/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - ecommerce-network

  # ── Grafana (Dashboards UI) ──────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: ecommerce-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/ecommerce-observability.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - loki
      - prometheus
    networks:
      - ecommerce-network

  # ── Jaeger (Tracing UI) ────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: ecommerce-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"
    user: root
    environment:
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_VALUE: /badger/data
      BADGER_DIRECTORY_KEY: /badger/key
    volumes:
      - jaeger-data:/badger
    networks:
      - ecommerce-network

# ── Volumes ───────────────────────────────────────────────────
volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  grafana-data:
    driver: local
  prometheus-data:
    driver: local
  alertmanager-data:
    driver: local
  loki-data:
    driver: local
  jaeger-data:
    driver: local

# ── Networks ──────────────────────────────────────────────────
networks:
  ecommerce-network:
    driver: bridge
    name: ecommerce-network
